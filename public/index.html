<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💬 شات سريع</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
      --border: #252a3a; --accent: #4f8ef7; --accent2: #7c5cfa;
      --green: #22d98a; --red: #ef4444; --text: #e8eaf2; --muted: #6b7394;
      --bubble-me: linear-gradient(135deg, #4f8ef7, #7c5cfa);
      --bubble-other: #1e2230;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Cairo', sans-serif; background: var(--bg);
      color: var(--text); min-height: 100dvh; display: flex;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    #join-screen {
      position: fixed; inset: 0; background: var(--bg); display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; gap: 24px; animation: fadeIn .4s ease; padding: 20px;
    }
    .join-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px 40px; width: 360px;
      max-width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .join-card .logo { font-size: 52px; margin-bottom: 12px; }
    .join-card h1 {
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
    }
    .join-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .join-input {
      width: 100%; padding: 14px 18px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 16px; text-align: right;
      outline: none; transition: border-color .2s; margin-bottom: 14px;
    }
    .join-input:focus { border-color: var(--accent); }
    .join-input::placeholder { color: var(--muted); }
    .join-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .join-btn:hover { opacity: .9; transform: translateY(-1px); }
    #app {
      display: none; width: 100%; max-width: 820px; height: 96dvh;
      flex-direction: row; border-radius: 24px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: 0 32px 100px rgba(0,0,0,.6);
      position: relative; min-height: 0;
    }
    #sidebar {
      width: 220px; background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; min-height: 0;
    }
    .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h3 {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    #online-count { font-size: 12px; color: var(--green); }
    #users-list {
      flex: 1; overflow-y: auto; padding: 12px 8px;
      display: flex; flex-direction: column; gap: 4px; min-height: 0;
    }
    .user-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 12px; font-size: 14px; font-weight: 600; transition: background .15s;
    }
    .user-item:hover { background: var(--surface2); }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
    #chat-main {
      flex: 1; display: flex; flex-direction: column; background: var(--bg);
      min-width: 0; min-height: 0; overflow: hidden; position: relative;
    }
    #chat-header {
      padding: 18px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; min-height: 72px; flex-shrink: 0;
    }
    .header-icon { font-size: 28px; flex-shrink: 0; }
    #chat-header h2 { font-size: 18px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #chat-header span { font-size: 12px; color: var(--green); margin-right: auto; }
    #call-btn {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      background: rgba(34,217,138,.15); color: var(--green);
      font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    #call-btn:hover { background: rgba(34,217,138,.3); }
    #call-btn:disabled { opacity: .4; cursor: not-allowed; }
    #clear-btn {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      background: rgba(239,68,68,.12); color: var(--red);
      font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    #clear-btn:hover { background: rgba(239,68,68,.25); }
    #game-btn {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      background: rgba(197,100,255,.15); color: #c564ff;
      font-size: 18px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    #game-btn:hover { background: rgba(197,100,255,.3); }
    #owner-logout-btn {
      display: none; padding: 6px 14px;
      background: rgba(239,68,68,.15); border: 1px solid var(--red);
      border-radius: 10px; color: var(--red);
      font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background .2s;
    }
    #owner-logout-btn:hover { background: rgba(239,68,68,.3); }
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      scroll-behavior: smooth; min-height: 0;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    }
    .msg { display: flex; flex-direction: column; max-width: 72%; animation: msgPop .2s ease; }
    .msg.me { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-username { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; padding: 0 6px; }
    .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; overflow-wrap: anywhere; }
    .msg.me .msg-bubble { background: var(--bubble-me); border-bottom-left-radius: 4px; color: #fff; }
    .msg.other .msg-bubble { background: var(--bubble-other); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 6px; }
    .sys-msg {
      text-align: center; font-size: 12px; color: var(--muted);
      padding: 6px 16px; background: rgba(255,255,255,.03);
      border-radius: 20px; align-self: center; animation: fadeIn .3s; max-width: 95%;
    }
    .msg-media-img { max-width: 240px; max-height: 240px; border-radius: 14px; cursor: pointer; display: block; object-fit: cover; }
    .msg-media-video { max-width: 240px; max-height: 200px; border-radius: 14px; display: block; background: #000; }
    #typing-indicator { min-height: 24px; padding: 0 20px 8px; font-size: 13px; color: var(--muted); font-style: italic; flex-shrink: 0; }
    #input-area {
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      position: sticky; bottom: 0; z-index: 20; flex-wrap: nowrap; flex-shrink: 0;
    }
    #msg-input {
      flex: 1; min-width: 0; padding: 12px 18px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 16px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 15px; text-align: right;
      outline: none; resize: none; max-height: 120px; transition: border-color .2s; line-height: 1.5; overflow-y: auto;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: opacity .2s, transform .15s;
    }
    #send-btn:hover { opacity: .9; transform: scale(1.05); }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }
    #emoji-btn, #voice-btn, #media-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 22px; transition: all .2s;
    }
    #emoji-btn:hover, #voice-btn:hover, #media-btn:hover { border-color: var(--accent); background: var(--surface); }
    #voice-btn.recording { background: rgba(239,68,68,.15); border-color: var(--red); animation: pulse-red 1s infinite; }
    #emoji-picker-wrap {
      position: absolute; bottom: 76px; left: 16px; z-index: 999;
      display: none; border-radius: 16px; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.5); max-width: calc(100vw - 24px);
    }
    #emoji-picker-wrap.open { display: block; }
    em-emoji-picker { --rgb-background: 22, 25, 32; --rgb-input: 30, 34, 48; --rgb-color: 232, 234, 242; --rgb-accent: 79, 142, 247; --border-radius: 0; height: 380px; width: 340px; max-width: 100%; }
    .voice-bubble { display: flex; align-items: center; gap: 10px; padding: 10px 14px; width: 100%; }
    .voice-play-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: rgba(255,255,255,.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: background .2s; }
    .msg.other .voice-play-btn { background: rgba(79,142,247,.2); }
    .voice-waveform { flex: 1; min-width: 50px; height: 28px; display: flex; align-items: center; gap: 2px; overflow: hidden; }
    .voice-waveform span { display: inline-block; width: 3px; border-radius: 2px; background: rgba(255,255,255,.6); }
    .msg.other .voice-waveform span { background: var(--accent); opacity: .7; }
    .voice-duration { font-size: 11px; opacity: .7; white-space: nowrap; flex-shrink: 0; }
    #rec-timer { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--red); font-weight: 700; flex-shrink: 0; }
    #rec-timer.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse-red 1s infinite; }
    #call-overlay {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(13,15,20,.96); backdrop-filter: blur(12px);
      flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      animation: fadeIn .3s ease;
    }
    #call-overlay.active { display: flex; }
    .call-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; animation: call-pulse 2s infinite;
    }
    @keyframes call-pulse {
      0%, 100% { box-shadow: 0 0 0 12px rgba(79,142,247,.15), 0 0 0 24px rgba(79,142,247,.07); }
      50% { box-shadow: 0 0 0 18px rgba(79,142,247,.1), 0 0 0 36px rgba(79,142,247,.04); }
    }
    .call-name { font-size: 24px; font-weight: 900; color: var(--text); }
    .call-status { font-size: 15px; color: var(--muted); }
    #call-timer-display { font-size: 22px; font-weight: 700; color: var(--green); display: none; }
    .call-actions { display: flex; gap: 24px; align-items: center; margin-top: 8px; }
    .call-action-btn {
      width: 64px; height: 64px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; cursor: pointer; transition: all .2s;
    }
    .call-action-btn.accept { background: var(--green); box-shadow: 0 8px 24px rgba(34,217,138,.4); }
    .call-action-btn.accept:hover { transform: scale(1.1); }
    .call-action-btn.reject { background: var(--red); box-shadow: 0 8px 24px rgba(239,68,68,.4); }
    .call-action-btn.reject:hover { transform: scale(1.1); }
    .call-action-btn.mute { background: var(--surface2); border: 1px solid var(--border); }
    .call-action-btn.mute.active { background: rgba(239,68,68,.2); border-color: var(--red); }
    .call-action-btn.speaker { background: var(--surface2); border: 1px solid var(--border); }
    .call-action-btn.speaker.active { background: rgba(79,142,247,.2); border-color: var(--accent); }
    #viewer-overlay {
      display: none; position: fixed; bottom: 20px; left: 20px; width: 280px;
      border-radius: 20px; z-index: 9999; flex-direction: column; align-items: stretch;
      background: rgba(13,15,20,.92); border: 1.5px solid var(--green);
      box-shadow: 0 8px 40px rgba(0,0,0,.7); cursor: grab; touch-action: none; overflow: hidden; user-select: none;
    }
    #viewer-overlay.active { display: flex; }
    #viewer-overlay.fullscreen-mode { width: 100vw !important; height: 100dvh !important; top: 0 !important; left: 0 !important; bottom: auto !important; border-radius: 0 !important; cursor: default; }
    #viewer-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(34,217,138,.08); border-bottom: 1px solid rgba(34,217,138,.15); flex-shrink: 0; cursor: grab; }
    #viewer-overlay.fullscreen-mode #viewer-header { cursor: default; }
    #viewer-label { font-size: 13px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse-red 1s infinite; flex-shrink: 0; }
    .viewer-controls { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; overflow: visible; }
    .viewer-ctrl-btn { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); color: var(--text); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .viewer-ctrl-btn:hover { background: rgba(255,255,255,.16); }
    .viewer-ctrl-btn.danger:hover { background: rgba(239,68,68,.25); border-color: var(--red); color: var(--red); }
    #viewer-video { width: 100%; display: block; background: #000; aspect-ratio: 4/3; object-fit: cover; flex-shrink: 0; }
    #viewer-overlay.fullscreen-mode #viewer-video { height: calc(100dvh - 44px); aspect-ratio: unset; object-fit: contain; }
    #rec-stream-indicator { display: none; align-items: center; gap: 6px; padding: 4px 12px; font-size: 11px; color: var(--red); font-weight: 700; background: rgba(239,68,68,.08); border-top: 1px solid rgba(239,68,68,.15); flex-shrink: 0; }
    #rec-stream-indicator.show { display: flex; }
    #fullscreen-overlay { display: none; position: fixed; inset: 0; z-index: 99999; background: #000; align-items: center; justify-content: center; }
    #fullscreen-overlay.active { display: flex; }
    #fullscreen-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
    #fullscreen-close { position: absolute; top: 16px; left: 16px; background: rgba(255,255,255,.12); border: none; border-radius: 10px; color: #fff; font-size: 22px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes msgPop { from { opacity: 0; transform: scale(.96) translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @media (max-width: 768px) {
      body { align-items: stretch; justify-content: stretch; }
      #app { width: 100%; height: 100dvh; border-radius: 0; flex-direction: column; border: none; box-shadow: none; }
      #sidebar { display: none; }
      #chat-main { height: 100%; }
      #chat-header { padding: 12px 14px; min-height: 60px; }
      .header-icon { font-size: 22px; }
      #chat-header h2 { font-size: 15px; }
      #messages { padding: 12px 12px 8px; gap: 8px; }
      .msg { max-width: 88%; }
      .msg-bubble { font-size: 14px; padding: 10px 14px; }
      #input-area { padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); gap: 6px; }
      #msg-input { font-size: 14px; padding: 10px 14px; }
      #send-btn, #emoji-btn, #voice-btn, #media-btn { width: 42px; height: 42px; border-radius: 12px; }
      #emoji-picker-wrap { left: 8px; right: 8px; bottom: 68px; }
      em-emoji-picker { width: 100% !important; height: 300px; }
      #viewer-overlay { width: 200px; left: 10px; bottom: 10px; }
      .join-card { width: 100%; padding: 30px 20px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- JOIN -->
  <div id="join-screen">
    <div class="join-card">
      <div class="logo">💬</div>
      <h1>شات سريع</h1>
      <p>ادخل اسمك وابدأ المحادثة فوراً</p>
      <input id="username-input" class="join-input" type="text" placeholder="اسمك هنا..." maxlength="20" />
      <button class="join-btn" onclick="joinChat()">دخول →</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div id="sidebar">
      <div class="sidebar-header">
        <h3>المتصلون</h3>
        <div id="online-count">0 أونلاين</div>
      </div>
      <div id="users-list"></div>
    </div>

    <div id="chat-main">
      <div id="chat-header">
        <span class="header-icon">💬</span>
        <h2>غرفة المحادثة</h2>
        <span id="status-dot">● متصل</span>
        <button id="call-btn" onclick="startCall()" title="مكالمة صوتية">📞</button>
        <button id="clear-btn" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
        <button id="game-btn" onclick="openGame()" title="العب كاندي كراش">🎮</button>
        <button id="owner-logout-btn" onclick="ownerLogout()">🚪 إنهاء</button>
      </div>
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <div id="input-area">
        <div id="emoji-picker-wrap"></div>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <textarea id="msg-input" placeholder="اكتب رسالتك..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>
        <div id="rec-timer"><div class="rec-dot"></div><span id="rec-time">0:00</span></div>
        <button id="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
        <button id="media-btn" onclick="triggerMediaUpload()">📎</button>
        <input id="media-input" type="file" accept="image/*,video/*" style="display:none" onchange="handleMediaUpload(event)" />
        <button id="voice-btn" onclick="toggleRecording()">🎙️</button>
      </div>
    </div>
  </div>

  <!-- CALL OVERLAY -->
  <div id="call-overlay">
    <div class="call-avatar">📞</div>
    <div class="call-name" id="call-name">مكالمة</div>
    <div class="call-status" id="call-status">جاري الاتصال...</div>
    <div id="call-timer-display">00:00</div>
    <div class="call-actions" id="call-actions-incoming">
      <button class="call-action-btn reject" onclick="rejectCall()">📵</button>
      <button class="call-action-btn accept" onclick="acceptCall()">📞</button>
    </div>
    <div class="call-actions" id="call-actions-active" style="display:none">
      <button class="call-action-btn mute" id="mute-btn" onclick="toggleMute()">🎙️</button>
      <button class="call-action-btn reject" onclick="endCall()">📵</button>
      <button class="call-action-btn speaker" id="speaker-btn" onclick="toggleSpeaker()">🔊</button>
    </div>
  </div>

  <!-- VIEWER -->
  <div id="viewer-overlay">
    <div id="viewer-header">
      <div id="viewer-label"><div class="live-dot"></div>بث مباشر</div>
      <div class="viewer-controls">
        <button class="viewer-ctrl-btn" onclick="setViewerSize('small')">⊟</button>
        <button class="viewer-ctrl-btn" id="switch-cam-btn" onclick="switchCamera()" title="عكس الكاميرا" style="display:flex">🔄</button>
        <button class="viewer-ctrl-btn" onclick="setViewerSize('medium')">⊞</button>
        <button class="viewer-ctrl-btn" onclick="setViewerSize('full')">⛶</button>
        <button class="viewer-ctrl-btn danger" onclick="closeViewer()">✕</button>
      </div>
    </div>
    <div style="position:relative;">
      <video id="viewer-video" autoplay playsinline muted style="width:100%;display:block;background:#000;aspect-ratio:4/3;object-fit:cover;"></video>
      <div id="play-overlay" onclick="manualPlay()" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:8px;">
        <div style="width:56px;height:56px;border-radius:50%;background:rgba(79,142,247,.85);display:flex;align-items:center;justify-content:center;font-size:24px;">▶</div>
        <span style="color:#fff;font-size:13px;font-family:'Cairo',sans-serif;">اضغط لتشغيل البث</span>
      </div>
    </div>
    <div id="rec-stream-indicator">
      <div class="rec-dot"></div>
      <span>جاري تسجيل البث...</span>
      <span id="rec-stream-time" style="margin-right:auto;opacity:.7">0:00</span>
    </div>
  </div>

  <!-- FULLSCREEN IMG -->
  <div id="fullscreen-overlay">
    <button id="fullscreen-close" onclick="closeFullscreen()">✕</button>
    <img id="fullscreen-img" src="" alt="" />
  </div>

  <!-- GAME MODAL -->
  <div id="game-modal" style="display:none;position:fixed;inset:0;z-index:99000;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;">
    <div style="width:min(500px,98vw);height:90dvh;border-radius:20px;overflow:hidden;position:relative;">
      <iframe id="game-frame" src="/game.html" style="width:100%;height:100%;border:none;border-radius:20px;"></iframe>
    </div>
  </div>

  <audio id="ringtone" loop>
    <source src="https://www.soundjay.com/phone/sounds/phone-calling-1.mp3" type="audio/mpeg">
  </audio>
  <audio id="busy-tone">
    <source src="https://www.soundjay.com/phone/sounds/phone-busy-1.mp3" type="audio/mpeg">
  </audio>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ["websocket", "polling"] });

    let myId = null, myName = '';
    let typingTimer = null, isTyping = false;
    let pickerInstance = null, pickerOpen = false;
    let mediaRecorder = null, audioChunks = [], recInterval = null, recSeconds = 0;
    let streamPC = null, localStreamObj = null, localStreamStarted = false;
    let streamRecorder = null, streamChunks = [], streamRecInterval = null, streamRecSeconds = 0;
    let insideChat = false;
    let callPC = null, callStream = null, callTimer = null, callSeconds = 0;
    let isMuted = false, isSpeaker = false, callAudioEl = null, inCall = false;
    let currentFacingMode = 'user';

    const iceServers = {
      iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:global.relay.metered.ca:80", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turn:global.relay.metered.ca:443", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" }
      ]
    };

    socket.on("ping", () => socket.emit("pong"));
    socket.on('connect', () => { myId = socket.id; });

    function joinChat() {
      const input = document.getElementById('username-input');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      myName = name;
      socket.emit('join', name);
    }
    document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

    socket.on('join-rejected', (data) => {
      myName = ''; insideChat = false;
      alert(data.reason);
    });

    socket.on('history', (history) => {
      insideChat = true;
      document.getElementById('messages').innerHTML = '';
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      if (myName === 'ahmedtony@#') document.getElementById('owner-logout-btn').style.display = 'inline-flex';
      if (!Array.isArray(history)) return;
      history.forEach(msg => {
        if (!msg.text) return;
        const isMe = msg.senderId ? msg.senderId === myId : msg.username === (myName === 'ahmedtony@#' ? 'المالك' : myName);
        appendMessage({ ...msg, id: isMe ? myId : 'other' }, false);
      });
      scrollDown(true);
    });

    socket.on('message', (data) => {
      const isMe = data.senderId === myId;
      appendMessage({ ...data, id: isMe ? myId : 'other' }, true);
    });

    socket.on('system', (data) => {
      const msgs = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = `${data.text} • ${data.time}`;
      msgs.appendChild(el);
      scrollDown(true);
    });

    socket.on('users', (users) => {
      const list = document.getElementById('users-list');
      const count = document.getElementById('online-count');
      list.innerHTML = '';
      count.textContent = `${users.length} أونلاين`;
      users.forEach(name => {
        const el = document.createElement('div');
        el.className = 'user-item';
        el.innerHTML = `<div class="user-dot"></div><span>${escapeHtml(name)}</span>`;
        list.appendChild(el);
      });
      document.getElementById('call-btn').disabled = users.length < 2;
    });

    socket.on('typing', ({ username, isTyping }) => {
      document.getElementById('typing-indicator').textContent = isTyping ? `${username} يكتب الآن...` : '';
    });

    function clearChat() {
      if (!confirm('مسح المحادثة بالكامل؟')) return;
      socket.emit('clear-chat');
    }
    socket.on('chat-cleared', () => {
      document.getElementById('messages').innerHTML = '';
    });

    function ownerLogout() {
      if (!confirm('هتنهي المحادثة؟')) return;
      socket.emit('owner-logout');
    }
    socket.on('force-logout', (data) => { alert(data.reason); resetToJoinScreen(); });

    function resetToJoinScreen() {
      insideChat = false; myName = ''; myId = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('join-screen').style.display = 'flex';
      document.getElementById('username-input').value = '';
      document.getElementById('messages').innerHTML = '';
      document.getElementById('owner-logout-btn').style.display = 'none';
      document.getElementById('viewer-overlay').classList.remove('active');
      document.getElementById('viewer-video').srcObject = null;
      if (localStreamObj) localStreamObj.getTracks().forEach(t => t.stop());
      if (streamPC) { try { streamPC.close(); } catch(e){} }
      if (window._viewerPC) { try { window._viewerPC.close(); } catch(e){} window._viewerPC = null; }
      localStreamStarted = false; localStreamObj = null; streamPC = null;
      currentFacingMode = 'user';
      document.getElementById('switch-cam-btn').style.display = 'none';
      stopStreamRecordingAndDownload();
      endCall();
    }

    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      socket.emit('message', { text });
      input.value = ''; input.style.height = 'auto';
      clearTyping(); scrollDown(true);
    }

    function appendMessage(data, shouldScroll = true) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const el = document.createElement('div');
      el.className = `msg ${isMe ? 'me' : 'other'}`;
      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble">${formatText(data.text || '')}</div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el);
      if (shouldScroll) scrollDown(true);
    }

    function triggerMediaUpload() { document.getElementById('media-input').click(); }
    function handleMediaUpload(event) {
      const file = event.target.files[0]; if (!file) return;
      if (file.size > 15 * 1024 * 1024) { alert('الحد الأقصى 15MB'); event.target.value = ''; return; }
      const isImage = file.type.startsWith('image/');
      const isVideo = file.type.startsWith('video/');
      if (!isImage && !isVideo) { alert('صورة أو فيديو فقط'); event.target.value = ''; return; }
      const reader = new FileReader();
      reader.onloadend = () => { socket.emit('media-upload', { dataUrl: reader.result, mediaType: isImage ? 'image' : 'video', fileName: file.name }); };
      reader.readAsDataURL(file); event.target.value = '';
    }
    socket.on('media-upload', (data) => {
      const isMe = data.senderId === myId;
      appendMediaMessage({ ...data, id: isMe ? myId : 'other' });
    });
    function appendMediaMessage(data) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const el = document.createElement('div'); el.className = `msg ${isMe ? 'me' : 'other'}`;
      let mediaHtml = data.mediaType === 'image'
        ? `<img class="msg-media-img" src="${data.dataUrl}" onclick="openFullscreen('${data.dataUrl}')" />`
        : `<video class="msg-media-video" src="${data.dataUrl}" controls playsinline></video>`;
      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble" style="padding:8px;">${mediaHtml}</div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el); scrollDown(true);
    }
    function openFullscreen(src) { document.getElementById('fullscreen-img').src = src; document.getElementById('fullscreen-overlay').classList.add('active'); }
    function closeFullscreen() { document.getElementById('fullscreen-overlay').classList.remove('active'); document.getElementById('fullscreen-img').src = ''; }
    document.getElementById('fullscreen-overlay').addEventListener('click', (e) => { if (e.target === document.getElementById('fullscreen-overlay')) closeFullscreen(); });

    async function toggleRecording() {
      if (!insideChat) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
      try {
        await startLocalStreamOnce();
        const audioTrack = localStreamObj.getAudioTracks()[0];
        if (!audioTrack) { alert("الميكروفون غير متاح"); return; }
        const audioStream = new MediaStream([audioTrack]);
        mediaRecorder = new MediaRecorder(audioStream, {
          mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
        });
        audioChunks = []; recSeconds = 0;
        mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const duration = recSeconds;
          stopRecordingUI();
          setTimeout(() => {
            if (!audioChunks.length) return;
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            sendVoiceMessage(blob, duration);
            mediaRecorder = null; audioChunks = [];
          }, 50);
        };
        mediaRecorder.start(80);
        startRecordingUI();
      } catch (err) { alert('تأكد من إذن الميكروفون والكاميرا!'); }
    }
    function startRecordingUI() {
      document.getElementById('voice-btn').classList.add('recording');
      document.getElementById('voice-btn').textContent = '⏹️';
      document.getElementById('rec-timer').classList.add('show');
      document.getElementById('msg-input').style.display = 'none';
      document.getElementById('emoji-btn').style.display = 'none';
      document.getElementById('media-btn').style.display = 'none';
      clearInterval(recInterval);
      recInterval = setInterval(() => { recSeconds++; document.getElementById('rec-time').textContent = formatDuration(recSeconds); }, 1000);
    }
    function stopRecordingUI() {
      document.getElementById('voice-btn').classList.remove('recording');
      document.getElementById('voice-btn').textContent = '🎙️';
      document.getElementById('rec-timer').classList.remove('show');
      document.getElementById('msg-input').style.display = '';
      document.getElementById('emoji-btn').style.display = '';
      document.getElementById('media-btn').style.display = '';
      clearInterval(recInterval);
    }
    function sendVoiceMessage(blob, duration) {
      const reader = new FileReader();
      reader.onloadend = () => { socket.emit('voice', { audio: reader.result.split(',')[1], duration }); };
      reader.readAsDataURL(blob);
    }
    socket.on('voice', (data) => {
      const isMe = data.senderId === myId;
      appendVoiceMessage({ ...data, id: isMe ? myId : 'other' });
    });
    function appendVoiceMessage(data) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const audioSrc = `data:audio/webm;base64,${data.audio}`;
      const dur = formatDuration(data.duration || 0);
      const bars = generateBars();
      const el = document.createElement('div'); el.className = `msg ${isMe ? 'me' : 'other'}`;
      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble voice-bubble">
          <button class="voice-play-btn" onclick="playVoice(this, '${audioSrc}')">▶</button>
          <div class="voice-waveform">${bars}</div>
          <span class="voice-duration">${dur}</span>
        </div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el); scrollDown(true);
    }
    function playVoice(btn, src) {
      const audio = new Audio(src); btn.textContent = '⏸';
      audio.play(); audio.onended = () => { btn.textContent = '▶'; }; audio.onpause = () => { btn.textContent = '▶'; };
    }

    async function startLocalStreamOnce() {
      if (localStreamStarted && localStreamObj && streamPC) return;
      try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){}
      try {
        localStreamObj = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
      } catch(err) {
        alert('تأكد من إذن الميكروفون والكاميرا!');
        throw err;
      }
      streamPC = new RTCPeerConnection(iceServers);
      streamPC.onconnectionstatechange = () => { if (streamPC.iceConnectionState === 'failed') streamPC.restartIce(); };
      localStreamObj.getTracks().forEach(track => streamPC.addTrack(track, localStreamObj));
      streamPC.onicecandidate = (e) => { if (e.candidate) socket.emit('stream-ice', { candidate: e.candidate }); };
      const offer = await streamPC.createOffer();
      await streamPC.setLocalDescription(offer);
      socket.emit('stream-offer', { offer });
      localStreamStarted = true;
      document.getElementById('switch-cam-btn').style.display = 'flex';
    }

    socket.on('stream-offer', async ({ offer }) => {
      if (!insideChat) return;
      if (localStreamStarted) return;
      const pc = new RTCPeerConnection(iceServers);
      pc.ontrack = (e) => {
        if (!e.streams || !e.streams[0]) return;
        const video = document.getElementById('viewer-video');
        const stream = e.streams[0];
        if (video.srcObject !== stream) video.srcObject = stream;
        const tryPlay = () => {
          video.play().then(() => {
            document.getElementById('play-overlay').style.display = 'none';
            startStreamRecording(stream);
          }).catch(() => {
            document.getElementById('play-overlay').style.display = 'flex';
            window._pendingStream = stream;
          });
        };
        if (stream.active) tryPlay(); else { stream.addEventListener('active', tryPlay, { once: true }); setTimeout(tryPlay, 500); }
      };
      pc.oniceconnectionstatechange = () => { if (pc.iceConnectionState === 'disconnected') setTimeout(() => { if (pc.iceConnectionState === 'disconnected') pc.restartIce(); }, 3000); };
      pc.onicecandidate = (e) => { if (e.candidate) socket.emit('stream-ice', { candidate: e.candidate }); };
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('stream-answer', { answer });
      window._viewerPC = pc;
      document.getElementById('viewer-overlay').classList.add('active');
      setViewerSize('small');
    });

    socket.on('stream-answer', async ({ answer }) => { if (streamPC) await streamPC.setRemoteDescription(new RTCSessionDescription(answer)); });

    socket.on('stream-ice', async ({ candidate }) => {
      const pc = localStreamStarted ? streamPC : window._viewerPC;
      try { if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){}
    });

    socket.on('stream-end', () => {
      stopStreamRecordingAndDownload();
      document.getElementById('viewer-video').srcObject = null;
      document.getElementById('viewer-overlay').classList.remove('active');
      document.getElementById('viewer-overlay').classList.remove('fullscreen-mode');
      if (window._viewerPC) { window._viewerPC.close(); window._viewerPC = null; }
    });

    async function switchCamera() {
      if (!localStreamStarted || !localStreamObj || !streamPC) return;
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      try {
        localStreamObj.getVideoTracks().forEach(t => t.stop());
        const newStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode }, audio: false
        });
        const newVideoTrack = newStream.getVideoTracks()[0];
        const sender = streamPC.getSenders().find(s => s.track && s.track.kind === 'video');
        if (sender) {
          await sender.replaceTrack(newVideoTrack);
          const offer = await streamPC.createOffer();
          await streamPC.setLocalDescription(offer);
          socket.emit('stream-offer-update', { offer });
        }
        localStreamObj.getVideoTracks().forEach(t => localStreamObj.removeTrack(t));
        localStreamObj.addTrack(newVideoTrack);
      } catch (err) {
        console.error('فشل تبديل الكاميرا:', err);
        alert('تعذّر تبديل الكاميرا');
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      }
    }

    socket.on('stream-offer-update', async ({ offer }) => {
      if (!window._viewerPC) return;
      await window._viewerPC.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await window._viewerPC.createAnswer();
      await window._viewerPC.setLocalDescription(answer);
      socket.emit('stream-answer-update', { answer });
    });

    socket.on('stream-answer-update', async ({ answer }) => {
      if (!streamPC) return;
      await streamPC.setRemoteDescription(new RTCSessionDescription(answer));
    });

    function startStreamRecording(stream) {
      if (streamRecorder) return;
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
      try { streamRecorder = new MediaRecorder(stream, { mimeType }); } catch(e) { return; }
      streamChunks = []; streamRecSeconds = 0;
      streamRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) streamChunks.push(e.data); };
      streamRecorder.onstop = () => {
        stopStreamRecUI();
        if (!streamChunks.length) return;
        const blob = new Blob(streamChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `بث-مباشر-${new Date().toLocaleDateString('ar-EG').replace(/\//g, '-')}.webm`;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 3000);
        streamRecorder = null; streamChunks = [];
      };
      streamRecorder.start(1000);
      startStreamRecUI();
    }
    function stopStreamRecordingAndDownload() { if (streamRecorder && streamRecorder.state !== 'inactive') streamRecorder.stop(); }
    function startStreamRecUI() {
      streamRecSeconds = 0;
      document.getElementById('rec-stream-indicator').classList.add('show');
      clearInterval(streamRecInterval);
      streamRecInterval = setInterval(() => { streamRecSeconds++; document.getElementById('rec-stream-time').textContent = formatDuration(streamRecSeconds); }, 1000);
    }
    function stopStreamRecUI() { clearInterval(streamRecInterval); document.getElementById('rec-stream-indicator').classList.remove('show'); }
    function manualPlay() {
      const video = document.getElementById('viewer-video'); video.muted = false;
      video.play().then(() => {
        document.getElementById('play-overlay').style.display = 'none';
        if (window._pendingStream) { startStreamRecording(window._pendingStream); window._pendingStream = null; }
      }).catch(err => { console.error(err); });
    }

    async function startCall() {
      if (inCall) return;
      try {
        callStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        callPC = new RTCPeerConnection(iceServers);
        callStream.getTracks().forEach(t => callPC.addTrack(t, callStream));
        callPC.ontrack = (e) => { playRemoteAudio(e.streams[0]); };
        callPC.onicecandidate = (e) => { if (e.candidate) socket.emit('call-ice', { candidate: e.candidate }); };
        callPC.onconnectionstatechange = () => {
          if (callPC.connectionState === 'connected') showActiveCall();
          if (callPC.connectionState === 'failed') endCall();
        };
        const offer = await callPC.createOffer();
        await callPC.setLocalDescription(offer);
        socket.emit('call-offer', { offer });
        showCallUI('calling');
        playRingtone(false);
      } catch(err) { alert('تأكد من إذن الميكروفون!'); }
    }
    socket.on('call-offer', async ({ offer, callerName }) => {
      if (inCall) { socket.emit('call-reject'); return; }
      showCallUI('incoming', callerName);
      playRingtone(true);
      window._pendingCallOffer = offer;
    });
    async function acceptCall() {
      stopRingtone();
      try {
        callStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        callPC = new RTCPeerConnection(iceServers);
        callStream.getTracks().forEach(t => callPC.addTrack(t, callStream));
        callPC.ontrack = (e) => { playRemoteAudio(e.streams[0]); };
        callPC.onicecandidate = (e) => { if (e.candidate) socket.emit('call-ice', { candidate: e.candidate }); };
        callPC.onconnectionstatechange = () => {
          if (callPC.connectionState === 'connected') showActiveCall();
          if (callPC.connectionState === 'failed') endCall();
        };
        await callPC.setRemoteDescription(new RTCSessionDescription(window._pendingCallOffer));
        const answer = await callPC.createAnswer();
        await callPC.setLocalDescription(answer);
        socket.emit('call-answer', { answer });
        inCall = true;
      } catch(err) { alert('تأكد من إذن الميكروفون!'); endCall(); }
    }
    function rejectCall() { stopRingtone(); socket.emit('call-reject'); hideCallUI(); }
    socket.on('call-answer', async ({ answer }) => { if (callPC) { await callPC.setRemoteDescription(new RTCSessionDescription(answer)); inCall = true; } });
    socket.on('call-ice', async ({ candidate }) => { try { if (callPC) await callPC.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e){} });
    socket.on('call-end', () => { endCall(); });
    socket.on('call-reject', () => { stopRingtone(); playBusyTone(); hideCallUI(); inCall = false; cleanupCallPC(); });
    function endCall() {
      stopRingtone(); socket.emit('call-end'); inCall = false;
      clearInterval(callTimer);
      document.getElementById('call-timer-display').style.display = 'none';
      hideCallUI(); cleanupCallPC();
    }
    function cleanupCallPC() {
      if (callStream) { callStream.getTracks().forEach(t => t.stop()); callStream = null; }
      if (callPC) { try { callPC.close(); } catch(e){} callPC = null; }
      if (callAudioEl) { callAudioEl.srcObject = null; callAudioEl = null; }
      isMuted = false; isSpeaker = false;
      document.getElementById('mute-btn').textContent = '🎙️';
      document.getElementById('mute-btn').classList.remove('active');
      document.getElementById('speaker-btn').classList.remove('active');
    }
    function playRemoteAudio(stream) {
      if (!callAudioEl) { callAudioEl = new Audio(); callAudioEl.autoplay = true; document.body.appendChild(callAudioEl); }
      callAudioEl.srcObject = stream;
    }
    function showCallUI(mode, callerName = '') {
      const overlay = document.getElementById('call-overlay');
      const incoming = document.getElementById('call-actions-incoming');
      const active = document.getElementById('call-actions-active');
      overlay.classList.add('active');
      document.getElementById('call-timer-display').style.display = 'none';
      if (mode === 'incoming') {
        document.getElementById('call-name').textContent = callerName || 'مكالمة واردة';
        document.getElementById('call-status').textContent = 'يتصل بك...';
        incoming.style.display = 'flex'; active.style.display = 'none';
      } else {
        document.getElementById('call-name').textContent = 'جاري الاتصال...';
        document.getElementById('call-status').textContent = 'ينتظر الرد...';
        incoming.style.display = 'none'; active.style.display = 'flex';
      }
    }
    function showActiveCall() {
      document.getElementById('call-status').textContent = 'متصل ✓';
      document.getElementById('call-actions-incoming').style.display = 'none';
      document.getElementById('call-actions-active').style.display = 'flex';
      const timerEl = document.getElementById('call-timer-display');
      timerEl.style.display = 'block'; callSeconds = 0; clearInterval(callTimer);
      callTimer = setInterval(() => { callSeconds++; timerEl.textContent = formatDuration(callSeconds); }, 1000);
    }
    function hideCallUI() {
      document.getElementById('call-overlay').classList.remove('active');
      document.getElementById('call-actions-incoming').style.display = 'flex';
      document.getElementById('call-actions-active').style.display = 'none';
      clearInterval(callTimer);
    }
    function toggleMute() {
      if (!callStream) return;
      isMuted = !isMuted;
      callStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
      const btn = document.getElementById('mute-btn');
      btn.textContent = isMuted ? '🔇' : '🎙️';
      btn.classList.toggle('active', isMuted);
    }
    function toggleSpeaker() {
      isSpeaker = !isSpeaker;
      if (callAudioEl) callAudioEl.volume = isSpeaker ? 1.0 : 0.7;
      document.getElementById('speaker-btn').classList.toggle('active', isSpeaker);
    }
    function playRingtone(loop) { try { const rt = document.getElementById('ringtone'); rt.loop = loop; rt.currentTime = 0; rt.play().catch(()=>{}); } catch(e){} }
    function stopRingtone() { try { const rt = document.getElementById('ringtone'); rt.pause(); rt.currentTime = 0; } catch(e){} }
    function playBusyTone() { try { const bt = document.getElementById('busy-tone'); bt.currentTime = 0; bt.play().catch(()=>{}); } catch(e){} }

    function setViewerSize(size) {
      const vo = document.getElementById('viewer-overlay');
      vo.classList.remove('fullscreen-mode'); vo.style.cursor = 'grab';
      if (size === 'small') { vo.style.width = window.innerWidth <= 768 ? '200px' : '280px'; vo.style.height = ''; }
      else if (size === 'medium') { vo.style.width = window.innerWidth <= 768 ? '320px' : '480px'; vo.style.height = ''; }
      else if (size === 'full') { vo.style.width = ''; vo.style.height = ''; vo.style.top = '0'; vo.style.left = '0'; vo.style.bottom = 'auto'; vo.classList.add('fullscreen-mode'); vo.style.cursor = 'default'; }
    }
    function closeViewer() {
      stopStreamRecordingAndDownload();
      document.getElementById('viewer-video').srcObject = null;
      const vo = document.getElementById('viewer-overlay');
      vo.classList.remove('active'); vo.classList.remove('fullscreen-mode');
      if (window._viewerPC) { window._viewerPC.close(); window._viewerPC = null; }
    }

    const vo = document.getElementById('viewer-overlay');
    let dragging = false, ox = 0, oy = 0;
    vo.addEventListener('mousedown', e => { if (vo.classList.contains('fullscreen-mode') || e.target.tagName === 'BUTTON' || e.target.tagName === 'VIDEO') return; dragging = true; ox = e.clientX - vo.offsetLeft; oy = e.clientY - vo.offsetTop; vo.style.cursor = 'grabbing'; });
    document.addEventListener('mousemove', e => { if (!dragging) return; vo.style.left = (e.clientX - ox) + 'px'; vo.style.top = (e.clientY - oy) + 'px'; vo.style.bottom = 'auto'; });
    document.addEventListener('mouseup', () => { if (dragging) { dragging = false; if (!vo.classList.contains('fullscreen-mode')) vo.style.cursor = 'grab'; } });
    vo.addEventListener('touchstart', e => { if (vo.classList.contains('fullscreen-mode') || e.target.tagName === 'BUTTON' || e.target.tagName === 'VIDEO') return; const t = e.touches[0]; dragging = true; ox = t.clientX - vo.offsetLeft; oy = t.clientY - vo.offsetTop; }, { passive: true });
    document.addEventListener('touchmove', e => { if (!dragging) return; const t = e.touches[0]; vo.style.left = (t.clientX - ox) + 'px'; vo.style.top = (t.clientY - oy) + 'px'; vo.style.bottom = 'auto'; }, { passive: true });
    document.addEventListener('touchend', () => { dragging = false; });

    function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function formatText(str) { return escapeHtml(str).replace(/\n/g,'<br>'); }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function handleTyping() { if (!isTyping) { isTyping = true; socket.emit('typing', true); } clearTimeout(typingTimer); typingTimer = setTimeout(clearTyping, 1000); }
    function clearTyping() { isTyping = false; socket.emit('typing', false); clearTimeout(typingTimer); }
    function scrollDown(force = false) { const msgs = document.getElementById('messages'); const nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 150; if (force || nearBottom) requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; }); }
    function generateBars() { return [4,6,10,14,18,14,20,16,12,18,22,16,10,8,14,18,12,8,6,4].map(h => `<span style="height:${h}px"></span>`).join(''); }
    function formatDuration(s) { const m = Math.floor(s / 60); return `${m}:${(s % 60).toString().padStart(2,'0')}`; }

    function toggleEmojiPicker() {
      const wrap = document.getElementById('emoji-picker-wrap');
      if (pickerOpen) { wrap.classList.remove('open'); pickerOpen = false; return; }
      if (!pickerInstance) {
        pickerInstance = new EmojiMart.Picker({
          onEmojiSelect: (emoji) => {
            const input = document.getElementById('msg-input');
            const pos = input.selectionStart;
            input.value = input.value.slice(0, pos) + emoji.native + input.value.slice(pos);
            input.focus(); input.selectionStart = input.selectionEnd = pos + emoji.native.length;
            autoResize(input);
          },
          locale: 'ar', theme: 'dark', set: 'native', skinTonePosition: 'search', previewPosition: 'none',
        });
        wrap.appendChild(pickerInstance);
      }
      wrap.classList.add('open'); pickerOpen = true;
    }
    document.addEventListener('click', (e) => {
      const wrap = document.getElementById('emoji-picker-wrap');
      const btn = document.getElementById('emoji-btn');
      if (pickerOpen && !wrap.contains(e.target) && e.target !== btn) { wrap.classList.remove('open'); pickerOpen = false; }
    });

    function openGame() { document.getElementById('game-modal').style.display = 'flex'; }
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'go-back-to-chat') { document.getElementById('game-modal').style.display = 'none'; }
    });

    window.addEventListener('beforeunload', () => {
      stopStreamRecordingAndDownload(); endCall();
      if (streamPC) { try { streamPC.close(); } catch(e){} }
      if (localStreamObj) localStreamObj.getTracks().forEach(t => { try { t.stop(); } catch(e){} });
    });
  </script>
</body>
</html>
