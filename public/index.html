<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>💬 شات سريع</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #161920; --surface2: #1e2230;
      --border: #252a3a; --accent: #4f8ef7; --accent2: #7c5cfa;
      --green: #22d98a; --text: #e8eaf2; --muted: #6b7394;
      --bubble-me: linear-gradient(135deg, #4f8ef7, #7c5cfa);
      --bubble-other: #1e2230;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Cairo', sans-serif; background: var(--bg);
      color: var(--text); min-height: 100dvh; display: flex;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }

    /* JOIN */
    #join-screen {
      position: fixed; inset: 0; background: var(--bg); display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; gap: 24px; animation: fadeIn .4s ease; padding: 20px;
    }
    .join-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px 40px; width: 360px;
      max-width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .join-card .logo { font-size: 52px; margin-bottom: 12px; }
    .join-card h1 {
      font-size: 26px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
    }
    .join-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .join-input {
      width: 100%; padding: 14px 18px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 16px; text-align: right;
      outline: none; transition: border-color .2s; margin-bottom: 14px;
    }
    .join-input:focus { border-color: var(--accent); }
    .join-input::placeholder { color: var(--muted); }
    .join-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px; color: #fff;
      font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .15s;
    }
    .join-btn:hover { opacity: .9; transform: translateY(-1px); }
    .join-btn:active { transform: translateY(0); }

    /* APP */
    #app {
      display: none; width: 100%; max-width: 820px; height: 96dvh;
      flex-direction: row; border-radius: 24px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: 0 32px 100px rgba(0,0,0,.6);
      position: relative; min-height: 0;
    }
    #sidebar {
      width: 220px; background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; min-height: 0;
    }
    .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h3 {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    #online-count { font-size: 12px; color: var(--green); }
    #users-list {
      flex: 1; overflow-y: auto; padding: 12px 8px;
      display: flex; flex-direction: column; gap: 4px; min-height: 0;
    }
    .user-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      transition: background .15s; animation: slideIn .3s ease;
    }
    .user-item:hover { background: var(--surface2); }
    .user-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      flex-shrink: 0; box-shadow: 0 0 6px var(--green);
    }

    /* CHAT MAIN */
    #chat-main {
      flex: 1; display: flex; flex-direction: column; background: var(--bg);
      min-width: 0; min-height: 0; overflow: hidden; position: relative;
    }
    #chat-header {
      padding: 18px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; min-height: 72px; flex-shrink: 0;
    }
    .header-icon { font-size: 28px; flex-shrink: 0; }
    #chat-header h2 {
      font-size: 18px; font-weight: 900;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #chat-header span { font-size: 12px; color: var(--green); margin-right: auto; }
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      scroll-behavior: smooth; min-height: 0;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    }
    .msg { display: flex; flex-direction: column; max-width: 72%; animation: msgPop .2s ease; }
    .msg.me { align-self: flex-end; align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-username { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; padding: 0 6px; }
    .msg-bubble {
      padding: 12px 16px; border-radius: 18px; font-size: 15px;
      line-height: 1.5; word-break: break-word; overflow-wrap: anywhere;
    }
    .msg.me .msg-bubble { background: var(--bubble-me); border-bottom-left-radius: 4px; color: #fff; }
    .msg.other .msg-bubble { background: var(--bubble-other); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 6px; }
    .sys-msg {
      text-align: center; font-size: 12px; color: var(--muted);
      padding: 6px 16px; background: rgba(255,255,255,.03);
      border-radius: 20px; align-self: center; animation: fadeIn .3s; max-width: 95%;
    }

    /* صور وفيديوهات في الشات */
    .msg-media-wrap { max-width: 100%; }
    .msg-media-img {
      max-width: 240px; max-height: 240px; border-radius: 14px;
      cursor: pointer; display: block; object-fit: cover; transition: opacity .2s;
    }
    .msg-media-img:hover { opacity: .85; }
    .msg-media-video {
      max-width: 240px; max-height: 200px; border-radius: 14px;
      display: block; background: #000; outline: none;
    }

    /* INPUT */
    #typing-indicator {
      min-height: 24px; padding: 0 20px 8px; font-size: 13px;
      color: var(--muted); font-style: italic; flex-shrink: 0;
    }
    #input-area {
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      position: sticky; bottom: 0; z-index: 20; flex-wrap: nowrap; flex-shrink: 0;
    }
    #msg-input {
      flex: 1; min-width: 0; padding: 12px 18px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 16px; color: var(--text);
      font-family: 'Cairo', sans-serif; font-size: 15px; text-align: right;
      outline: none; resize: none; max-height: 120px;
      transition: border-color .2s; line-height: 1.5; overflow-y: auto;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .15s;
    }
    #send-btn:hover { opacity: .9; transform: scale(1.05); }
    #send-btn:active { transform: scale(.97); }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    #emoji-btn, #voice-btn, #media-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: all .2s;
    }
    #emoji-btn:hover, #voice-btn:hover, #media-btn:hover {
      border-color: var(--accent); background: var(--surface);
    }
    #voice-btn.recording {
      background: rgba(239,68,68,.15); border-color: #ef4444;
      animation: pulse-red 1s infinite;
    }

    #emoji-picker-wrap {
      position: absolute; bottom: 76px; left: 16px; z-index: 999;
      display: none; border-radius: 16px; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.5); max-width: calc(100vw - 24px);
    }
    #emoji-picker-wrap.open { display: block; }
    em-emoji-picker {
      --rgb-background: 22, 25, 32; --rgb-input: 30, 34, 48;
      --rgb-color: 232, 234, 242; --rgb-accent: 79, 142, 247;
      --border-radius: 0; height: 380px; width: 340px; max-width: 100%;
    }

    /* تسجيل صوتي */
    .voice-bubble {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px; width: 100%;
    }
    .voice-play-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; transition: background .2s;
    }
    .msg.other .voice-play-btn { background: rgba(79,142,247,.2); }
    .voice-play-btn:hover { background: rgba(255,255,255,.35); }
    .voice-waveform {
      flex: 1; min-width: 50px; height: 28px;
      display: flex; align-items: center; gap: 2px; overflow: hidden;
    }
    .voice-waveform span { display: inline-block; width: 3px; border-radius: 2px; background: rgba(255,255,255,.6); }
    .msg.other .voice-waveform span { background: var(--accent); opacity: .7; }
    .voice-duration { font-size: 11px; opacity: .7; white-space: nowrap; flex-shrink: 0; }

    #rec-timer {
      display: none; align-items: center; gap: 8px;
      font-size: 13px; color: #ef4444; font-weight: 700; flex-shrink: 0;
    }
    #rec-timer.show { display: flex; }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
      animation: pulse-red 1s infinite;
    }

    /* ===== VIEWER OVERLAY - قابل للسحب والتكبير ===== */
    #viewer-overlay {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 280px;
      border-radius: 20px;
      z-index: 9999;
      flex-direction: column;
      align-items: stretch;
      background: rgba(13,15,20,.92);
      border: 1.5px solid var(--green);
      box-shadow: 0 8px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(34,217,138,.15);
      cursor: grab;
      touch-action: none;
      overflow: hidden;
      user-select: none;
      transition: width .25s, height .25s, border-radius .25s;
    }
    #viewer-overlay.active { display: flex; }
    #viewer-overlay.fullscreen-mode {
      width: 100vw !important;
      height: 100dvh !important;
      top: 0 !important; left: 0 !important;
      bottom: auto !important; right: auto !important;
      border-radius: 0 !important;
      cursor: default;
    }

    #viewer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: rgba(34,217,138,.08);
      border-bottom: 1px solid rgba(34,217,138,.15);
      flex-shrink: 0;
      cursor: grab;
    }
    #viewer-overlay.fullscreen-mode #viewer-header { cursor: default; }

    #viewer-label {
      font-size: 13px; font-weight: 700; color: var(--green);
      display: flex; align-items: center; gap: 6px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #ef4444;
      animation: pulse-red 1s infinite; flex-shrink: 0;
    }

    .viewer-controls { display: flex; align-items: center; gap: 6px; }
    .viewer-ctrl-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      color: var(--text); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .viewer-ctrl-btn:hover { background: rgba(255,255,255,.16); }
    .viewer-ctrl-btn.danger:hover { background: rgba(239,68,68,.25); border-color: #ef4444; color: #ef4444; }

    #viewer-video {
      width: 100%; display: block; background: #000;
      aspect-ratio: 4/3; object-fit: cover;
      flex-shrink: 0;
    }
    #viewer-overlay.fullscreen-mode #viewer-video {
      height: calc(100dvh - 44px);
      aspect-ratio: unset;
      object-fit: contain;
    }

    /* مؤشر تسجيل البث */
    #rec-stream-indicator {
      display: none; align-items: center; gap: 6px;
      padding: 4px 12px; font-size: 11px; color: #ef4444; font-weight: 700;
      background: rgba(239,68,68,.08); border-top: 1px solid rgba(239,68,68,.15);
      flex-shrink: 0;
    }
    #rec-stream-indicator.show { display: flex; }

    /* FULLSCREEN - عرض كامل */
    #fullscreen-overlay {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: #000; align-items: center; justify-content: center;
      flex-direction: column;
    }
    #fullscreen-overlay.active { display: flex; }
    #fullscreen-img {
      max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px;
    }
    #fullscreen-close {
      position: absolute; top: 16px; left: 16px;
      background: rgba(255,255,255,.12); border: none; border-radius: 10px;
      color: #fff; font-size: 22px; width: 40px; height: 40px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
    @keyframes msgPop { from { opacity: 0; transform: scale(.96) translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      #app { max-width: 100%; height: 100dvh; border-radius: 0; }
      #sidebar { width: 190px; }
    }
    @media (max-width: 768px) {
      body { align-items: stretch; justify-content: stretch; }
      #app { width: 100%; height: 100dvh; border-radius: 0; flex-direction: column; border: none; box-shadow: none; }
      #sidebar { display: none; }
      #chat-main { height: 100%; }
      #chat-header { padding: 12px 14px; min-height: 60px; gap: 10px; }
      .header-icon { font-size: 22px; }
      #chat-header h2 { font-size: 15px; }
      #chat-header span { font-size: 11px; }
      #messages { padding: 12px 12px 8px; gap: 8px; }
      .msg { max-width: 88%; }
      .msg-bubble { font-size: 14px; padding: 10px 14px; border-radius: 16px; }
      .msg-time { font-size: 10px; }
      #typing-indicator { min-height: 20px; padding: 0 12px 6px; font-size: 12px; }
      #input-area { padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); gap: 6px; }
      #msg-input { font-size: 14px; padding: 10px 14px; border-radius: 14px; max-height: 100px; }
      #send-btn, #emoji-btn, #voice-btn, #media-btn { width: 42px; height: 42px; border-radius: 12px; }
      #emoji-btn, #media-btn { font-size: 20px; }
      #voice-btn { font-size: 18px; }
      #send-btn svg { width: 18px; height: 18px; }
      #emoji-picker-wrap { left: 8px; right: 8px; bottom: 68px; margin: auto; max-width: unset; }
      em-emoji-picker { width: 100% !important; height: 300px; }
      #viewer-overlay { width: 200px; left: 10px; bottom: 10px; }
      .join-card { width: 100%; max-width: 380px; padding: 30px 20px; border-radius: 20px; }
      .join-card .logo { font-size: 44px; }
      .join-card h1 { font-size: 22px; }
      .join-card p { font-size: 13px; margin-bottom: 22px; }
      .join-input, .join-btn { font-size: 14px; padding: 12px 14px; }
    }
    @media (max-width: 420px) {
      #chat-header { padding: 10px 12px; }
      #chat-header h2 { font-size: 14px; }
      .msg { max-width: 92%; }
      .msg-bubble { font-size: 13.5px; padding: 9px 12px; }
      #send-btn, #emoji-btn, #voice-btn, #media-btn { width: 40px; height: 40px; }
      #msg-input { font-size: 13.5px; }
      .voice-bubble { gap: 8px; padding: 8px 10px; }
      .voice-play-btn { width: 30px; height: 30px; }
    }
  </style>
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen">
    <div class="join-card">
      <div class="logo">💬</div>
      <h1>شات سريع</h1>
      <p>ادخل اسمك وابدأ المحادثة فوراً</p>
      <input id="username-input" class="join-input" type="text" placeholder="اسمك هنا..." maxlength="20" />
      <button class="join-btn" onclick="joinChat()">دخول →</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div id="sidebar">
      <div class="sidebar-header">
        <h3>المتصلون</h3>
        <div id="online-count">0 أونلاين</div>
      </div>
      <div id="users-list"></div>
    </div>

    <div id="chat-main">
      <div id="chat-header">
        <span class="header-icon">💬</span>
        <h2>غرفة المحادثة</h2>
        <span id="status-dot">● متصل</span>
      </div>
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <div id="input-area">
        <div id="emoji-picker-wrap"></div>

        <!-- زر إرسال -->
        <button id="send-btn" onclick="sendMessage()" title="إرسال">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>

        <!-- حقل الكتابة -->
        <textarea id="msg-input" placeholder="اكتب رسالتك..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this); handleTyping()"></textarea>

        <!-- مؤقت التسجيل الصوتي -->
        <div id="rec-timer">
          <div class="rec-dot"></div>
          <span id="rec-time">0:00</span>
        </div>

        <!-- إيموجي -->
        <button id="emoji-btn" onclick="toggleEmojiPicker()" title="إيموجي">😊</button>

        <!-- رفع صورة / فيديو -->
        <button id="media-btn" onclick="triggerMediaUpload()" title="إرسال صورة أو فيديو">📎</button>
        <input id="media-input" type="file" accept="image/*,video/*" style="display:none" onchange="handleMediaUpload(event)" />

        <!-- تسجيل صوتي + بث كاميرا -->
        <button id="voice-btn" onclick="toggleRecording()" title="تسجيل صوتي">🎙️</button>
      </div>
    </div>
  </div>

  <!-- VIEWER OVERLAY - البث المباشر القابل للسحب والتكبير -->
  <div id="viewer-overlay">
    <div id="viewer-header">
      <div id="viewer-label">
        <div class="live-dot"></div>
        بث مباشر
      </div>
      <div class="viewer-controls">
        <!-- تصغير -->
        <button class="viewer-ctrl-btn" onclick="setViewerSize('small')" title="تصغير">⊟</button>
        <!-- تكبير متوسط -->
        <button class="viewer-ctrl-btn" onclick="setViewerSize('medium')" title="توسيع">⊞</button>
        <!-- ملء الشاشة -->
        <button class="viewer-ctrl-btn" onclick="setViewerSize('full')" title="ملء الشاشة">⛶</button>
        <!-- إغلاق -->
        <button class="viewer-ctrl-btn danger" onclick="closeViewer()" title="إغلاق">✕</button>
      </div>
    </div>
    <video id="viewer-video" autoplay playsinline muted></video>
    <div id="rec-stream-indicator">
      <div class="rec-dot"></div>
      <span>جاري تسجيل البث...</span>
      <span id="rec-stream-time" style="margin-right:auto;opacity:.7">0:00</span>
    </div>
  </div>

  <!-- عرض الصور بالحجم الكامل -->
  <div id="fullscreen-overlay">
    <button id="fullscreen-close" onclick="closeFullscreen()">✕</button>
    <img id="fullscreen-img" src="" alt="" />
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({ transports: ["websocket", "polling"] });

    let myId = null, myName = '';
    let typingTimer = null, isTyping = false;
    let pickerInstance = null, pickerOpen = false;
    let mediaRecorder = null, audioChunks = [], recInterval = null, recSeconds = 0;
    let streamPC = null, localStreamObj = null, localStreamStarted = false;

    // متغيرات تسجيل البث
    let streamRecorder = null, streamChunks = [], streamRecInterval = null, streamRecSeconds = 0;

    const iceServers = {
      iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:global.relay.metered.ca:80", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turn:global.relay.metered.ca:443", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" },
        { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "4e3bac8e9ee08a354b784744", credential: "9EJqUQsZInfFvq+m" }
      ]
    };

    socket.on("ping", () => socket.emit("pong"));

    // ===== JOIN =====
    function joinChat() {
      const input = document.getElementById('username-input');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      myName = name;
      socket.emit('join', name);
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      setTimeout(() => scrollDown(true), 50);
    }
    document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
    socket.on('connect', () => { myId = socket.id; });

    socket.on('history', (history) => {
      history.forEach(msg => { if (!msg.text) return; appendMessage({ ...msg, id: msg.username === myName ? myId : 'other' }, false); });
      scrollDown(true);
    });
    socket.on('message', (data) => appendMessage(data, true));

    socket.on('system', (data) => {
      const msgs = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = `${data.text} • ${data.time}`;
      msgs.appendChild(el);
      scrollDown(true);
    });

    socket.on('users', (users) => {
      const list = document.getElementById('users-list');
      const count = document.getElementById('online-count');
      list.innerHTML = '';
      count.textContent = `${users.length} أونلاين`;
      users.forEach(name => {
        const el = document.createElement('div');
        el.className = 'user-item';
        el.innerHTML = `<div class="user-dot"></div><span>${escapeHtml(name)}</span>`;
        list.appendChild(el);
      });
    });

    socket.on('typing', ({ username, isTyping }) => {
      document.getElementById('typing-indicator').textContent = isTyping ? `${username} يكتب الآن...` : '';
    });

    // ===== رسائل نصية =====
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      socket.emit('message', { text });
      input.value = '';
      input.style.height = 'auto';
      clearTyping();
      scrollDown(true);
    }

    function appendMessage(data, shouldScroll = true) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const el = document.createElement('div');
      el.className = `msg ${isMe ? 'me' : 'other'}`;
      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble">${formatText(data.text || '')}</div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el);
      if (shouldScroll) scrollDown(true);
    }

    // ===== رفع صورة / فيديو =====
    function triggerMediaUpload() {
      document.getElementById('media-input').click();
    }

    function handleMediaUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const maxSize = 15 * 1024 * 1024; // 15MB
      if (file.size > maxSize) { alert('الملف كبير جداً! الحد الأقصى 15MB'); event.target.value = ''; return; }

      const isImage = file.type.startsWith('image/');
      const isVideo = file.type.startsWith('video/');
      if (!isImage && !isVideo) { alert('يرجى اختيار صورة أو فيديو فقط'); event.target.value = ''; return; }

      const reader = new FileReader();
      reader.onloadend = () => {
        socket.emit('media-upload', {
          dataUrl: reader.result,
          mediaType: isImage ? 'image' : 'video',
          fileName: file.name
        });
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    socket.on('media-upload', (data) => appendMediaMessage(data));

    function appendMediaMessage(data) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const el = document.createElement('div');
      el.className = `msg ${isMe ? 'me' : 'other'}`;

      let mediaHtml = '';
      if (data.mediaType === 'image') {
        mediaHtml = `<img class="msg-media-img" src="${data.dataUrl}" alt="صورة" onclick="openFullscreen('${data.dataUrl}')" />`;
      } else {
        mediaHtml = `<video class="msg-media-video" src="${data.dataUrl}" controls playsinline></video>`;
      }

      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble" style="padding:8px;">
          <div class="msg-media-wrap">${mediaHtml}</div>
        </div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el);
      scrollDown(true);
    }

    // ===== عرض صورة كاملة =====
    function openFullscreen(src) {
      document.getElementById('fullscreen-img').src = src;
      document.getElementById('fullscreen-overlay').classList.add('active');
    }
    function closeFullscreen() {
      document.getElementById('fullscreen-overlay').classList.remove('active');
      document.getElementById('fullscreen-img').src = '';
    }
    document.getElementById('fullscreen-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('fullscreen-overlay')) closeFullscreen();
    });

    // ===== تسجيل صوتي =====
    async function toggleRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
      }
      try {
        await startLocalStreamOnce();
        const audioTrack = localStreamObj.getAudioTracks()[0];
        if (!audioTrack) { alert("الميكروفون غير متاح"); return; }
        const audioStream = new MediaStream([audioTrack]);
        mediaRecorder = new MediaRecorder(audioStream, {
          mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
        });
        audioChunks = [];
        recSeconds = 0;
        mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const duration = recSeconds;
          stopRecordingUI();
          setTimeout(() => {
            if (!audioChunks.length) return;
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            sendVoiceMessage(blob, duration);
            mediaRecorder = null;
            audioChunks = [];
          }, 50);
        };
        mediaRecorder.start(80);
        startRecordingUI();
      } catch (err) {
        console.error(err);
        alert('مش قادر يوصل للكاميرا والميكروفون! تأكد من إذن المتصفح.');
      }
    }

    function startRecordingUI() {
      document.getElementById('voice-btn').classList.add('recording');
      document.getElementById('voice-btn').textContent = '⏹️';
      document.getElementById('rec-timer').classList.add('show');
      document.getElementById('msg-input').style.display = 'none';
      document.getElementById('emoji-btn').style.display = 'none';
      document.getElementById('media-btn').style.display = 'none';
      clearInterval(recInterval);
      recInterval = setInterval(() => {
        recSeconds++;
        const m = Math.floor(recSeconds / 60);
        const s = recSeconds % 60;
        document.getElementById('rec-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);
    }

    function stopRecordingUI() {
      document.getElementById('voice-btn').classList.remove('recording');
      document.getElementById('voice-btn').textContent = '🎙️';
      document.getElementById('rec-timer').classList.remove('show');
      document.getElementById('msg-input').style.display = '';
      document.getElementById('emoji-btn').style.display = '';
      document.getElementById('media-btn').style.display = '';
      clearInterval(recInterval);
      keepInputVisible();
    }

    function sendVoiceMessage(blob, duration) {
      const reader = new FileReader();
      reader.onloadend = () => { socket.emit('voice', { audio: reader.result.split(',')[1], duration }); };
      reader.readAsDataURL(blob);
    }

    socket.on('voice', (data) => appendVoiceMessage(data));

    function appendVoiceMessage(data) {
      const msgs = document.getElementById('messages');
      const isMe = data.id === myId;
      const audioSrc = `data:audio/webm;base64,${data.audio}`;
      const dur = formatDuration(data.duration || 0);
      const bars = generateBars();
      const el = document.createElement('div');
      el.className = `msg ${isMe ? 'me' : 'other'}`;
      el.innerHTML = `
        ${!isMe ? `<div class="msg-username">${escapeHtml(data.username || '')}</div>` : ''}
        <div class="msg-bubble voice-bubble">
          <button class="voice-play-btn" onclick="playVoice(this, '${audioSrc}')">▶</button>
          <div class="voice-waveform">${bars}</div>
          <span class="voice-duration">${dur}</span>
        </div>
        <div class="msg-time">${escapeHtml(data.time || '')}</div>
      `;
      msgs.appendChild(el);
      scrollDown(true);
    }

    function playVoice(btn, src) {
      const audio = new Audio(src);
      btn.textContent = '⏸';
      audio.play();
      audio.onended = () => { btn.textContent = '▶'; };
      audio.onpause = () => { btn.textContent = '▶'; };
    }

    function generateBars() {
      const heights = [4,6,10,14,18,14,20,16,12,18,22,16,10,8,14,18,12,8,6,4];
      return heights.map(h => `<span style="height:${h}px"></span>`).join('');
    }

    function formatDuration(s) {
      const m = Math.floor(s / 60);
      return `${m}:${(s % 60).toString().padStart(2,'0')}`;
    }

    // ===== البث المباشر - WebRTC =====
    async function startLocalStreamOnce() {
      if (localStreamStarted && localStreamObj && streamPC) return;
      localStreamObj = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
      streamPC = new RTCPeerConnection(iceServers);
      streamPC.onconnectionstatechange = () => { console.log('Streamer state:', streamPC.connectionState); };
      streamPC.oniceconnectionstatechange = () => {
        console.log('Streamer ICE:', streamPC.iceConnectionState);
        if (streamPC.iceConnectionState === 'failed') streamPC.restartIce();
      };
      localStreamObj.getTracks().forEach(track => streamPC.addTrack(track, localStreamObj));
      streamPC.onicecandidate = (e) => { if (e.candidate) socket.emit('stream-ice', { candidate: e.candidate }); };
      const offer = await streamPC.createOffer();
      await streamPC.setLocalDescription(offer);
      socket.emit('stream-offer', { offer });
      localStreamStarted = true;
    }

    // ===== استقبال البث =====
    socket.on('stream-offer', async ({ offer }) => {
      const pc = new RTCPeerConnection(iceServers);

      pc.ontrack = (e) => {
        const video = document.getElementById('viewer-video');
        if (e.streams && e.streams[0]) {
          video.srcObject = e.streams[0];
          video.play().catch(err => console.log('play error:', err));

          // بدء تسجيل البث فور وصول الستريم
          startStreamRecording(e.streams[0]);
        }
      };

      pc.onconnectionstatechange = () => {
        console.log('Connection state:', pc.connectionState);
        if (pc.connectionState === 'failed') pc.restartIce();
      };

      pc.oniceconnectionstatechange = () => {
        console.log('ICE state:', pc.iceConnectionState);
        if (pc.iceConnectionState === 'disconnected') {
          setTimeout(() => { if (pc.iceConnectionState === 'disconnected') pc.restartIce(); }, 3000);
        }
      };

      pc.onicecandidate = (e) => { if (e.candidate) socket.emit('stream-ice', { candidate: e.candidate }); };

      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('stream-answer', { answer });

      window._viewerPC = pc;
      const overlay = document.getElementById('viewer-overlay');
      overlay.classList.add('active');
      // استعادة الحجم الافتراضي عند بدء البث
      setViewerSize('small');
    });

    socket.on('stream-answer', async ({ answer }) => {
      if (streamPC) await streamPC.setRemoteDescription(new RTCSessionDescription(answer));
    });

    socket.on('stream-ice', async ({ candidate }) => {
      const pc = streamPC || window._viewerPC;
      try { if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (e) { console.error(e); }
    });

    socket.on('stream-end', () => {
      stopStreamRecordingAndDownload();
      document.getElementById('viewer-video').srcObject = null;
      document.getElementById('viewer-overlay').classList.remove('active');
      document.getElementById('viewer-overlay').classList.remove('fullscreen-mode');
      if (window._viewerPC) { window._viewerPC.close(); window._viewerPC = null; }
    });

    // ===== تسجيل البث وتنزيله =====
    function startStreamRecording(stream) {
      if (streamRecorder) return; // تسجيل شغال فعلاً

      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
        ? 'video/webm;codecs=vp9,opus'
        : MediaRecorder.isTypeSupported('video/webm')
        ? 'video/webm'
        : '';

      try {
        streamRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
      } catch (e) {
        console.error('MediaRecorder error:', e);
        return;
      }

      streamChunks = [];
      streamRecSeconds = 0;

      streamRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) streamChunks.push(e.data);
      };

      streamRecorder.onstop = () => {
        stopStreamRecUI();
        if (streamChunks.length === 0) return;
        const blob = new Blob(streamChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `بث-مباشر-${new Date().toLocaleDateString('ar-EG').replace(/\//g, '-')}.webm`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 3000);
        streamRecorder = null;
        streamChunks = [];
      };

      streamRecorder.start(1000);
      startStreamRecUI();
    }

    function stopStreamRecordingAndDownload() {
      if (streamRecorder && streamRecorder.state !== 'inactive') {
        streamRecorder.stop();
      }
    }

    function startStreamRecUI() {
      streamRecSeconds = 0;
      document.getElementById('rec-stream-indicator').classList.add('show');
      clearInterval(streamRecInterval);
      streamRecInterval = setInterval(() => {
        streamRecSeconds++;
        const m = Math.floor(streamRecSeconds / 60);
        const s = streamRecSeconds % 60;
        document.getElementById('rec-stream-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);
    }

    function stopStreamRecUI() {
      clearInterval(streamRecInterval);
      document.getElementById('rec-stream-indicator').classList.remove('show');
    }

    // ===== حجم المشاهد / السحب =====
    function setViewerSize(size) {
      const vo = document.getElementById('viewer-overlay');
      vo.classList.remove('fullscreen-mode');
      vo.style.cursor = 'grab';

      if (size === 'small') {
        vo.style.width = window.innerWidth <= 768 ? '200px' : '280px';
        vo.style.height = '';
      } else if (size === 'medium') {
        vo.style.width = window.innerWidth <= 768 ? '320px' : '480px';
        vo.style.height = '';
      } else if (size === 'full') {
        // ملء الشاشة الكاملة
        vo.style.width = '';
        vo.style.height = '';
        vo.style.top = '0';
        vo.style.left = '0';
        vo.style.bottom = 'auto';
        vo.style.right = 'auto';
        vo.classList.add('fullscreen-mode');
        vo.style.cursor = 'default';
      }
    }

    function closeViewer() {
      stopStreamRecordingAndDownload();
      document.getElementById('viewer-video').srcObject = null;
      const vo = document.getElementById('viewer-overlay');
      vo.classList.remove('active');
      vo.classList.remove('fullscreen-mode');
      if (window._viewerPC) { window._viewerPC.close(); window._viewerPC = null; }
    }

    // ===== سحب المشاهد =====
    const vo = document.getElementById('viewer-overlay');
    let dragging = false, ox = 0, oy = 0;

    vo.addEventListener('mousedown', e => {
      if (vo.classList.contains('fullscreen-mode')) return;
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'VIDEO') return;
      dragging = true;
      ox = e.clientX - vo.offsetLeft;
      oy = e.clientY - vo.offsetTop;
      vo.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      vo.style.left = (e.clientX - ox) + 'px';
      vo.style.top = (e.clientY - oy) + 'px';
      vo.style.bottom = 'auto';
    });

    document.addEventListener('mouseup', () => {
      if (dragging) { dragging = false; if (!vo.classList.contains('fullscreen-mode')) vo.style.cursor = 'grab'; }
    });

    vo.addEventListener('touchstart', e => {
      if (vo.classList.contains('fullscreen-mode')) return;
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'VIDEO') return;
      const touch = e.touches[0];
      dragging = true;
      ox = touch.clientX - vo.offsetLeft;
      oy = touch.clientY - vo.offsetTop;
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!dragging) return;
      const touch = e.touches[0];
      vo.style.left = (touch.clientX - ox) + 'px';
      vo.style.top = (touch.clientY - oy) + 'px';
      vo.style.bottom = 'auto';
    }, { passive: true });

    document.addEventListener('touchend', () => { dragging = false; });

    // ===== Helpers =====
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function formatText(str) { return escapeHtml(str).replace(/\n/g,'<br>'); }

    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, window.innerWidth <= 768 ? 100 : 120) + 'px';
      keepInputVisible();
    }

    function handleTyping() {
      if (!isTyping) { isTyping = true; socket.emit('typing', true); }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(clearTyping, 1000);
    }

    function clearTyping() { isTyping = false; socket.emit('typing', false); clearTimeout(typingTimer); }

    function scrollDown(force = false) {
      const msgs = document.getElementById('messages');
      const nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 150;
      if (force || nearBottom) requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
    }

    function keepInputVisible() {
      const inputArea = document.getElementById('input-area');
      setTimeout(() => inputArea.scrollIntoView({ block: 'end', behavior: 'smooth' }), 30);
    }

    function toggleEmojiPicker() {
      const wrap = document.getElementById('emoji-picker-wrap');
      if (pickerOpen) { wrap.classList.remove('open'); pickerOpen = false; return; }
      if (!pickerInstance) {
        pickerInstance = new EmojiMart.Picker({
          onEmojiSelect: (emoji) => {
            const input = document.getElementById('msg-input');
            const pos = input.selectionStart;
            input.value = input.value.slice(0, pos) + emoji.native + input.value.slice(pos);
            input.focus();
            input.selectionStart = input.selectionEnd = pos + emoji.native.length;
            autoResize(input);
          },
          locale: 'ar', theme: 'dark', set: 'native',
          skinTonePosition: 'search', previewPosition: 'none',
        });
        wrap.appendChild(pickerInstance);
      }
      wrap.classList.add('open');
      pickerOpen = true;
      keepInputVisible();
    }

    document.addEventListener('click', (e) => {
      const wrap = document.getElementById('emoji-picker-wrap');
      const btn = document.getElementById('emoji-btn');
      if (pickerOpen && !wrap.contains(e.target) && e.target !== btn) {
        wrap.classList.remove('open');
        pickerOpen = false;
      }
    });

    window.addEventListener('resize', () => { keepInputVisible(); scrollDown(); });

    document.getElementById('msg-input').addEventListener('focus', () => {
      setTimeout(() => { keepInputVisible(); scrollDown(true); }, 200);
    });

    window.addEventListener('beforeunload', () => {
      stopStreamRecordingAndDownload();
      if (streamPC) { try { streamPC.close(); } catch (e) {} }
      if (localStreamObj) localStreamObj.getTracks().forEach(t => { try { t.stop(); } catch (e) {} });
    });
  </script>
